<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donnez votre avis - Salama Shop</title>
    
    <!-- Styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #2E5090 0%, #4A6FA5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #2E5090;
            margin-bottom: 10px;
        }
        
        .logo span {
            color: #FFD700;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .ticket-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: left;
            font-size: 14px;
            border-left: 4px solid #2E5090;
        }
        
        .ticket-info p {
            margin: 5px 0;
        }
        
        .ticket-info strong {
            color: #2E5090;
        }
        
        .question {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
            font-weight: 500;
        }
        
        .emoji-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .emoji {
            font-size: 60px;
            cursor: pointer;
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s;
            text-align: center;
            min-width: 150px;
            border: 3px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .emoji span {
            display: block;
            font-size: 18px;
            margin-top: 10px;
            color: #333;
            font-weight: 500;
        }
        
        .emoji.selected {
            transform: scale(1.05);
            border-color: #2E5090;
            box-shadow: 0 10px 30px rgba(46,80,144,0.3);
        }
        
        .satisfait {
            background-color: #d4edda;
        }
        
        .satisfait:hover {
            background-color: #c3e6cb;
        }
        
        .moyen {
            background-color: #fff3cd;
        }
        
        .moyen:hover {
            background-color: #ffe69c;
        }
        
        .decu {
            background-color: #f8d7da;
        }
        
        .decu:hover {
            background-color: #f5c6cb;
        }
        
        .comment-section {
            margin-bottom: 30px;
            text-align: left;
        }
        
        .comment-section label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: bold;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #2E5090;
            box-shadow: 0 0 0 3px rgba(46,80,144,0.1);
        }
        
        button {
            background: #2E5090;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        button:hover {
            background: #1a3a6f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46,80,144,0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        .footer a {
            color: #2E5090;
            text-decoration: none;
            font-weight: bold;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .emoji {
                font-size: 40px;
                min-width: 100px;
                padding: 15px;
            }
            
            .question {
                font-size: 20px;
            }
            
            button {
                font-size: 16px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SALAMA <span>SHOP</span></div>
        <div class="subtitle">Boutique de vêtements & chaussures</div>
        
        <div id="message" class="message"></div>
        
        <div id="ticketInfo" class="ticket-info">
            <!-- Rempli par JavaScript -->
        </div>
        
        <div class="question">
            Comment s'est passée votre expérience ?
        </div>
        
        <div class="emoji-container">
            <div class="emoji satisfait" onclick="selectNote(1, this)">
                😊<span>Satisfait</span>
            </div>
            <div class="emoji moyen" onclick="selectNote(2, this)">
                😐<span>Moyen</span>
            </div>
            <div class="emoji decu" onclick="selectNote(3, this)">
                😞<span>Déçu</span>
            </div>
        </div>
        
        <div class="comment-section">
            <label for="commentaire">Votre commentaire (optionnel) :</label>
            <textarea id="commentaire" placeholder="Laissez votre avis..."></textarea>
        </div>
        
        <button id="submitBtn" onclick="soumettreAvis()">
            Envoyer mon avis
        </button>
        
        <div class="footer">
            Merci de votre confiance !<br>
            📞 <a href="tel:61998909">61 998 909</a><br>
            © 2026 Salama Shop - Tous droits réservés
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURATION - TON LIEN TALLY
        // ============================================
        const TALLY_URL = 'https://tally.so/r/vGB2bd';
        
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let noteSelectionnee = null;
        let elementSelectionne = null;
        let envoiEnCours = false;
        
        // ============================================
        // RÉCUPÉRER LES PARAMÈTRES URL
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const type = urlParams.get('type');
        const nom = urlParams.get('nom');
        const tel = urlParams.get('tel');
        const ticket = urlParams.get('ticket');
        
        // ============================================
        // AFFICHER LES INFOS DU TICKET
        // ============================================
        const ticketInfo = document.getElementById('ticketInfo');
        
        if (ticket) {
            ticketInfo.innerHTML = `
                <p><strong>🧾 TICKET:</strong> ${ticket}</p>
                <p><strong>👤 CLIENT:</strong> ${nom || 'Client'}</p>
                <p><strong>📞 TÉLÉPHONE:</strong> ${tel || 'Non renseigné'}</p>
            `;
            ticketInfo.style.display = 'block';
        } else if (type === 'boutique') {
            ticketInfo.innerHTML = '<p><strong>🏪 QR CODE BOUTIQUE</strong><br>Donnez votre avis sur notre boutique</p>';
            ticketInfo.style.display = 'block';
        } else {
            ticketInfo.style.display = 'none';
        }
        
        // ============================================
        // FONCTIONS
        // ============================================
        
        /**
         * Sélectionne une note
         */
        function selectNote(note, element) {
            noteSelectionnee = note;
            
            // Retirer sélection précédente
            if (elementSelectionne) {
                elementSelectionne.classList.remove('selected');
            }
            
            // Ajouter sélection
            element.classList.add('selected');
            elementSelectionne = element;
        }
        
        /**
         * Affiche un message à l'utilisateur
         */
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Faire défiler jusqu'au message
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // Masquer après 5 secondes
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        /**
         * Ajoute un indicateur de chargement au bouton
         */
        function setLoading(isLoading) {
            const submitBtn = document.getElementById('submitBtn');
            
            if (isLoading) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading"></span> Redirection...';
            } else {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Envoyer mon avis';
            }
        }
        
        /**
         * Soumet l'avis en redirigeant vers Tally
         */
        function soumettreAvis() {
            // Vérifier qu'une note est sélectionnée
            if (!noteSelectionnee) {
                showMessage('Veuillez sélectionner une note', 'error');
                return;
            }
            
            // Empêcher les doubles envois
            if (envoiEnCours) return;
            
            // Récupérer le commentaire
            const commentaire = document.getElementById('commentaire').value.trim();
            
            // Activer le mode chargement
            envoiEnCours = true;
            setLoading(true);
            
            // Construire l'URL Tally avec tous les paramètres
            const params = new URLSearchParams({
                'Note': noteSelectionnee === 1 ? '😊 Satisfait' : 
                        (noteSelectionnee === 2 ? '😐 Moyen' : '😞 Déçu'),
                'Commentaire': commentaire || '(Aucun commentaire)',
                'Code QR': code || 'Non spécifié',
                'Type QR': type || 'Non spécifié',
                'Client': nom || 'Anonyme',
                'Téléphone': tel || 'Non renseigné',
                'Ticket': ticket || 'Non spécifié',
                'Date': new Date().toLocaleString('fr-FR')
            });
            
            // URL finale avec paramètres
            const redirectUrl = `${TALLY_URL}?${params.toString()}`;
            
            // Afficher un message de confirmation avant redirection
            showMessage('Redirection vers le formulaire...', 'info');
            
            // Petite pause pour voir le message
            setTimeout(() => {
                // Rediriger vers Tally
                window.location.href = redirectUrl;
            }, 1000);
        }
        
        // ============================================
        // GESTIONNAIRES D'ÉVÉNEMENTS
        // ============================================
        
        // Permettre l'envoi avec la touche Entrée (sauf si shift+entrée pour nouvelle ligne)
        document.getElementById('commentaire').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                soumettreAvis();
            }
        });
        
        // Afficher un message de bienvenue
        window.addEventListener('load', function() {
            console.log('Page d\'avis Salama Shop chargée');
        });
    </script>
</body>
</html>
